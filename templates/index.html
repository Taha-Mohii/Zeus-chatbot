<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeus chatbot</title>
    <style>
        *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
             background: #0a0a0f;
        color: #e8e8f0;
        font-family: monospace;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        }
        .container {
        width: 760px;
        height: 90vh;
        background: #111118;
        border: 1px solid #1e1e2e;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .header {
    padding: 20px 28px;
    border-bottom: 1px solid #1e1e2e;
    }

    .header h1 {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.05em;
    }

    #chat {
        flex: 1;
        overflow-y: auto;
        padding: 24px 28px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        }

        .input-area {
            padding: 16px 28px;
            border-top: 1px solid #1e1e2e;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #userInput {
            flex: 1;
            background: #0f0f1a;
            border: 1px solid #1e1e2e;
            border-radius: 10px;
            padding: 12px 16px;
            font-family: monospace;
            font-size: 13px;
            color: #e8e8f0;
            outline: none;
        }

        #userInput:focus {
            border-color: #7c6aff;
        }

        button {
            background: #7c6aff;
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            color: white;
            font-family: monospace;
            font-size: 13px;
            cursor: pointer;
        }

        button:hover {
            background: #6a58e0;
        }
        .message {
    display: flex;
    max-width: 75%;
    padding: 10px 16px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.6;
}

        .message.user {
            align-self: flex-end;
            background: #1a1a2e;
            border: 1px solid rgba(124, 106, 255, 0.2);
            border-bottom-right-radius: 4px;
        }

        .message.zeus {
            align-self: flex-start;
            background: #13131f;
            border: 1px solid #1e1e2e;
            border-bottom-left-radius: 4px;
        }
            .typing {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 10px 16px;
        background: #13131f;
        border: 1px solid #1e1e2e;
        border-radius: 14px;
        border-bottom-left-radius: 4px;
        width: fit-content;
    }

    .typing span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #7c6aff;
        animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30% { transform: translateY(-6px); opacity: 1; }
    }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Zeus Chat</h1>
        </div>
        <div id="chat"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Message Zeus...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script>

        function showTyping(){
            const typing = document.createElement("div");
            typing.id = "typing";
            typing.classList.add("typing");
            typing.innerHTML = `<span></span><span></span><span></span>`;
            document.getElementById("chat").appendChild(typing);
            document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
        }
        function removeTyping(){
            const t = document.getElementById("typing");
            if (t) t.remove();
        }

        async function sendMessage(){
            const input = document.getElementById("userInput");
            const message = input.value;
            if(!message.trim()) return;
            input.value = "";
            showTyping();

            const response = await fetch("/chat",{
                method: "POST",
                headers: {"Content-Type" : "application/json"},
                body : JSON.stringify({message : message})
            });
            const data = await response.json();
            removeTyping();
            document.getElementById("chat").innerHTML += `<div class="message user"><p>${message}</p></div> 
                                                           <div class="message zeus"><p>${data.reply}</p></div>`
            document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;

        }
        document.getElementById("userInput").addEventListener("keydown",function(e){
            if(e.key === "Enter")sendMessage();
        });
    </script>
</body>
</html>
